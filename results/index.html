<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workshop Results — AI Lab</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fafafa;
      color: #111;
      min-height: 100vh;
      padding: 3rem 1.5rem;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #666;
      margin-bottom: 2rem;
    }

    .grid {
      display: grid;
      gap: 0.5rem;
    }

    .grid a {
      display: block;
      padding: 0.75rem 1rem;
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      color: #111;
      text-decoration: none;
      transition: border-color 0.15s;
    }

    .grid a:hover {
      border-color: #111;
    }

    .empty, .error, .loading {
      color: #666;
      padding: 2rem 0;
    }

    .error { color: #e5484d; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Workshop Results</h1>
    <p class="subtitle">From Prompt to Web App — Bauhaus InfAU</p>
    <div id="projects" class="grid">
      <p class="loading">Loading projects…</p>
    </div>
  </div>

  <script>
    const REPO = "Bauhaus-InfAU/ai-lab";
    const PATH = "results";
    const container = document.getElementById("projects");

    async function loadProjects() {
      try {
        const res = await fetch(
          `https://api.github.com/repos/${REPO}/contents/${PATH}`
        );
        if (!res.ok) throw new Error(`GitHub API ${res.status}`);
        const items = await res.json();

        const dirs = items
          .filter(item => item.type === "dir")
          .sort((a, b) => a.name.localeCompare(b.name));

        if (dirs.length === 0) {
          container.innerHTML =
            '<p class="empty">No projects published yet. Check back after the workshop!</p>';
          return;
        }

        container.innerHTML = dirs
          .map(d => `<a href="${d.name}/">${d.name}</a>`)
          .join("");
      } catch (err) {
        container.innerHTML =
          `<p class="error">Could not load projects. ${err.message}</p>`;
      }
    }

    loadProjects();
  </script>
</body>
</html>
